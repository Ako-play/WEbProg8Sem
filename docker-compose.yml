services:
  db:
    image: postgres:16-alpine
    container_name: crypto-parser-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crypto_parser}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: crypto-parser-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_NAME: ${APP_NAME:-crypto-parser}
      APP_ENV: ${APP_ENV:-development}
      HTTP_PORT: ${HTTP_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/crypto_parser?sslmode=disable}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      RATES_PROVIDER_URL: ${RATES_PROVIDER_URL:-https://api.coingecko.com/api/v3}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      MIGRATIONS_DIR: /app/migrations
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
    container_name: crypto-parser-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
